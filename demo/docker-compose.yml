x-airflow-common: &airflow-common
  image: apache/airflow:2.7.3-python3.10
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:?err}@postgres/${POSTGRES_DB:-airflow}
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:-YlVkR3RoUHNqNzNfUHJvZF9GZXJuZXRfS2V5X0hlcmU=}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__WEBSERVER__RBAC: 'true'
    # Watcher plugin settings
    AIRFLOW__WATCHER__SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    AIRFLOW__WATCHER__SLACK_CHANNEL: ${SLACK_CHANNEL:-#airflow-alerts}
    AIRFLOW__WATCHER__EMAIL_ENABLED: 'false'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./data:/opt/airflow/data
    - ./plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    ports:
      - "5433:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # Extra webservers for side-by-side RBAC demo recording
  # Port 8081 — weather_user, Port 8082 — ecommerce_user
  airflow-webserver-weather:
    <<: *airflow-common
    command: webserver
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-webserver-ecommerce:
    <<: *airflow-common
    command: webserver
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        exec /entrypoint airflow version
        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo "AIRFLOW_UID not set!"
          exit 1
        fi
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:?AIRFLOW_ADMIN_PASSWORD must be set in .env}
    user: "0:0"
    volumes:
      - .:/sources

  # Creates RBAC test users with different DAG-level permissions.
  # Run after airflow-init: docker-compose up rbac-setup
  rbac-setup:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        echo "=== Creating RBAC test roles and users ==="

        # Helper function to add common UI permissions to a role
        add_ui_perms() {
          local ROLE=$$1
          # Read permissions for UI resources
          for RES in Website "Watcher Dashboard" "Audit Logs" "DAG Dependencies" \
                     "DAG Code" "DAG Runs" "Datasets" "Cluster Activity" "ImportError" \
                     "DAG Warnings" "Jobs" "My Password" "My Profile" "Plugins" \
                     "SLA Misses" "Task Instances" "Task Logs" "XComs"; do
            airflow roles add-perms "$$ROLE" -a can_read -r "$$RES" 2>/dev/null || true
          done
          # Edit own profile
          for RES in "My Password" "My Profile"; do
            airflow roles add-perms "$$ROLE" -a can_edit -r "$$RES" 2>/dev/null || true
          done
          # Allow triggering DAG runs
          airflow roles add-perms "$$ROLE" -a can_create -r "DAG Runs" 2>/dev/null || true
          # Menu access for Airflow menus
          for RES in "Browse" "DAGs" "DAG Dependencies" "DAG Runs" "Datasets" \
                     "Cluster Activity" "Documentation" "Docs" "Jobs" "Audit Logs" \
                     "Plugins" "SLA Misses" "Task Instances"; do
            airflow roles add-perms "$$ROLE" -a menu_access -r "$$RES" 2>/dev/null || true
          done
          # Menu access for Watcher plugin
          for RES in "Watcher" "Watcher Dashboard" "Airflow Dashboard" "Airflow Health" \
                     "DAG Failures" "DAG Scheduling" "Dependencies" "SLA Tracker" "Task Health"; do
            airflow roles add-perms "$$ROLE" -a menu_access -r "$$RES" 2>/dev/null || true
          done
        }

        # Helper to add DAG-level read/edit/delete/trigger permissions
        add_dag_perms() {
          local ROLE=$$1
          local DAG_ID=$$2
          for ACTION in can_read can_edit can_delete; do
            airflow roles add-perms "$$ROLE" -a "$$ACTION" -r "DAG:$$DAG_ID" 2>/dev/null || true
          done
        }

        # --- Role: team_weather ---
        airflow roles create team_weather 2>/dev/null || true
        add_ui_perms team_weather
        add_dag_perms team_weather weather_data_pipeline
        add_dag_perms team_weather stock_market_collector

        # --- Role: team_ecommerce ---
        airflow roles create team_ecommerce 2>/dev/null || true
        add_ui_perms team_ecommerce
        add_dag_perms team_ecommerce ecommerce_sales_etl
        add_dag_perms team_ecommerce data_quality_checks

        # --- User: weather_user ---
        airflow users create \
          --username weather_user \
          --password "${WEATHER_USER_PASSWORD:?WEATHER_USER_PASSWORD must be set in .env}" \
          --firstname Weather \
          --lastname Team \
          --role team_weather \
          --email weather@example.com 2>/dev/null || true

        # --- User: ecommerce_user ---
        airflow users create \
          --username ecommerce_user \
          --password "${ECOMMERCE_USER_PASSWORD:?ECOMMERCE_USER_PASSWORD must be set in .env}" \
          --firstname Ecommerce \
          --lastname Team \
          --role team_ecommerce \
          --email ecommerce@example.com 2>/dev/null || true

        echo ""
        echo "=== RBAC test users created ==="
        echo ""
        echo "  admin          → sees ALL DAGs (Admin role)"
        echo "  weather_user   → sees only weather_data_pipeline, stock_market_collector"
        echo "  ecommerce_user → sees only ecommerce_sales_etl, data_quality_checks"
        echo ""
        echo "Log in with each user at http://localhost:8080 and check the Watcher dashboard."
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume:
